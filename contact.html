<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact form for website project">
    <meta name="keywords" content="contact, form, student website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology for Students - Contact</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body id="top">

    <header>
        <h1>Contact Page</h1>
        <p>A simple form example for this website project.</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="page2.html">Study Tools</a>
        <a href="page3.html">Gallery</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Contact Form</h2>
            <p>Please complete the form below.</p>

            <form action="#" method="get">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>

                <label for="topic">Topic</label>
                <select id="topic" name="topic">
                    <option value="study">Study Tools</option>
                    <option value="gallery">Gallery</option>
                    <option value="general">General Question</option>
                </select>

                <p class="radio-title">Are you interested in educational technology?</p>
                <div class="radio-group">
                    <label><input type="radio" name="interest" value="yes"> Yes</label>
                    <label><input type="radio" name="interest" value="no"> No</label>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <input type="submit" value="Submit Form">
            </form>
        </section>

        <section>
            <h2>Location Map</h2>
            <iframe
                src="https://www.google.com/maps?q=Dublin&output=embed"
                width="100%"
                height="300"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </section>

        <p class="top-link"><a href="#top">Back to top</a></p>
    </main>

    <footer>
        <p>Copyright &copy; 2026</p>
        <p>
            <a href="index.html">Home</a> |
            <a href="page2.html">Study Tools</a> |
            <a href="page3.html">Gallery</a> |
            <a href="contact.html">Contact</a>
        </p>
    </footer>

</body>
</html>
